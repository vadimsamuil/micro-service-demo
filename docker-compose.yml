version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - micro-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  user-service:
    image: user-service:latest
    build: ./user-service
    networks:
      - micro-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure

  order-service:
    image: order-service:latest
    build: ./order-service
    networks:
      - micro-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure

networks:
  micro-net:
    external: true
